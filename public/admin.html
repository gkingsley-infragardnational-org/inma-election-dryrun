<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Election Admin — Live Tally</title>
<style>
  :root {
    --navy: #0b1f3a;
    --navy-alt: #13294e;
    --navy-card: #16305a;
    --gold: #f2c94c;
    --gold-bright: #ffd700;
    --white: #ffffff;
    --gray-light: #d7dee8;
    --border: #2c4874;
    --error-bg: #ffffff;
    --error-text: #7a1c17;
    --error-border: #c0392b;
  }
  * { box-sizing: border-box; }
  body { font-family: -apple-system, Segoe UI, Arial, sans-serif; max-width: 720px; margin: 0 auto; padding: 24px 16px 64px; background: var(--navy); color: var(--white); }
  h1 { color: var(--gold-bright); font-size: 1.4rem; }
  a { color: var(--gold-bright); }
  .banner { background: var(--navy-card); border: 1px solid var(--border); border-left: 4px solid var(--gold); padding: 10px 14px; border-radius: 6px; margin-bottom: 20px; font-size: 0.9rem; color: var(--gray-light); }
  input[type=password] { padding: 8px; font-size: 1rem; width: 260px; border-radius:6px; border:1px solid var(--border); }
  button { padding: 8px 14px; font-size: 0.95rem; font-weight:700; cursor: pointer; margin-left: 8px; background: var(--gold); color: var(--navy); border:none; border-radius:6px; }
  button:hover { background: var(--gold-bright); }
  table { width: 100%; border-collapse: collapse; margin-top: 20px; }
  th, td { text-align: left; padding: 8px 10px; border: 1px solid var(--border); }
  th { background: var(--navy-alt); color: var(--gold); }
  td { background: var(--navy-card); }
  .bar { height: 8px; background: var(--gold); border-radius: 4px; }
  .meta { color: var(--gray-light); font-size: 0.85rem; margin-top: 10px; }
  .err { background:#fff; color: #7a1c17; border: 2px solid var(--error-border); padding: 10px 12px; border-radius: 6px; margin-top: 10px; font-weight:600; }
  label { font-weight: 600; font-size: 0.9rem; color: var(--gray-light); }
</style>
</head>
<body>
  <h1>Election Admin — Live Tally</h1>
  <div class="banner">Read-only results view. Requires the admin key set in the Cloudflare dashboard. Need to manage candidates, upload voters, or reset test votes? Go to the <a href="/admin-console">Admin Console</a>.</div>

  <label for="key">Admin key</label><br/>
  <input type="password" id="key" autocomplete="off" />
  <button id="load">Load results</button>
  <label style="margin-left:16px;"><input type="checkbox" id="auto" /> Auto-refresh every 15s</label>

  <div id="out"></div>

<script>
  const keyInput = document.getElementById('key');
  const saved = sessionStorage.getItem('adminKey');
  if (saved) keyInput.value = saved;

  let timer = null;

  async function load() {
    const key = keyInput.value.trim();
    if (!key) { render(null, 'Enter the admin key.'); return; }
    sessionStorage.setItem('adminKey', key);

    try {
      const [tallyRes, turnoutRes] = await Promise.all([
        fetch('/api/tally', { headers: { 'X-Admin-Key': key } }),
        fetch('/api/export-turnout', { headers: { 'X-Admin-Key': key } }),
      ]);
      if (!tallyRes.ok) { render(null, 'Unauthorized or server error loading tally.'); return; }
      const tally = await tallyRes.json();

      let turnoutCount = null;
      if (turnoutRes.ok) {
        const csv = await turnoutRes.text();
        turnoutCount = csv.trim().split('\n').slice(1).filter(l => l.split(',')[1] === 'true').length;
      }
      render(tally, null, turnoutCount);
    } catch (e) {
      render(null, 'Network error contacting the server.');
    }
  }

  function render(tally, error, turnoutCount) {
    const out = document.getElementById('out');
    if (error) { out.innerHTML = `<div class="err">${error}</div>`; return; }

    const max = Math.max(1, ...tally.results.map(r => r.votes));
    const rows = tally.results.map(r => `
      <tr>
        <td>${r.name}${r.ima ? ` <span style="color:var(--gray-light)">(${r.ima})</span>` : ''}</td>
        <td>${r.votes}</td>
        <td style="width:40%"><div class="bar" style="width:${(r.votes / max) * 100}%"></div></td>
      </tr>`).join('');

    out.innerHTML = `
      <h2 style="margin-top:24px;color:var(--gold-bright);">${tally.electionName}</h2>
      <table>
        <thead><tr><th>Candidate</th><th>Votes</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <div class="meta">
        Ballots cast: ${tally.totalBallotsCast}${turnoutCount !== null ? ` · Voters recorded as turned out: ${turnoutCount}` : ''}
        ${turnoutCount !== null && turnoutCount !== tally.totalBallotsCast ? '<br/><strong style="color:#e0a030">Reconciliation mismatch — ballot count and turnout count differ. Investigate before certifying.</strong>' : ''}
        <br/>Max selections per ballot: ${tally.maxSelections} · As of: ${new Date(tally.asOf).toLocaleString()}
      </div>`;
  }

  document.getElementById('load').addEventListener('click', load);
  document.getElementById('auto').addEventListener('change', (e) => {
    if (e.target.checked) { timer = setInterval(load, 15000); load(); }
    else { clearInterval(timer); }
  });
</script>
</body>
</html>
